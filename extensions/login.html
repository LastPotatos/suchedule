<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bannerweb Login</title>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f5f7fb;color:#18212f;margin:0;padding:30px}
main{max-width:460px;margin:auto;background:white;border:1px solid #d9e0ea;border-radius:14px;padding:22px;box-shadow:0 8px 30px rgba(16,24,40,.08)}
h1{font-size:22px;margin:0 0 8px}p{color:#667085;line-height:1.45}label{display:block;font-weight:700;margin-top:14px}input{width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #d9e0ea;border-radius:9px;margin-top:5px;font:inherit}button{width:100%;margin-top:18px;padding:11px;border:0;border-radius:9px;background:#1f5eff;color:white;font:inherit;font-weight:800;cursor:pointer}button:disabled{opacity:.55;cursor:not-allowed}.status{margin-top:14px;padding:10px;border-radius:8px;background:#f2f4f7}.error{background:#fff1f0;color:#912018}.ok{background:#ecfdf3;color:#067647}.note{font-size:12px}
</style>
</head>
<body>
<main>
  <h1>Bannerweb Login</h1>
  <p>This page belongs to the browser extension. Your password is sent only to Bannerweb for this single login attempt and is not stored.</p>
  <form id="loginForm">
    <label>Term code<input id="term" inputmode="numeric" pattern="\d{6}" maxlength="6" required></label>
    <label>Username<input id="username" autocomplete="username" required></label>
    <label>Password<input id="password" type="password" autocomplete="current-password" required></label>
    <button id="submitBtn" type="submit">Login once</button>
  </form>
  <div id="status" class="status">Ready.</div>
  <p class="note">There is no automatic retry loop. A failed login requires another explicit click.</p>
</main>
<script src="login.js"></script>
</body>
</html>
